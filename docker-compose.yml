name: crypto-manual-alert-v2

# The Agent image is built by the official `langgraph build` command before
# Compose starts this durable local integration topology.
services:
  product-postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PRODUCT_POSTGRES_DB:-crypto_alert_v2}
      POSTGRES_USER: ${PRODUCT_POSTGRES_USER:-crypto_alert}
      POSTGRES_PASSWORD: ${PRODUCT_POSTGRES_PASSWORD:-crypto_alert_local}
    volumes:
      - type: volume
        source: product-postgres-data
        target: /var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  agent-postgres:
    image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AGENT_POSTGRES_DB:-langgraph}
      POSTGRES_USER: ${AGENT_POSTGRES_USER:-langgraph}
      POSTGRES_PASSWORD: ${AGENT_POSTGRES_PASSWORD:-langgraph_local}
    command:
      - postgres
      - -c
      - shared_preload_libraries=vector
    volumes:
      - type: volume
        source: agent-postgres-data
        target: /var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  langgraph-redis:
    image: public.ecr.aws/docker/library/redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 1s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: crypto-manual-alert-v2-backend:local
    pull_policy: never
    restart: "no"
    environment:
      PRODUCT_DATABASE_URL: ${COMPOSE_PRODUCT_DATABASE_URL:-postgresql+asyncpg://crypto_alert:crypto_alert_local@product-postgres:5432/crypto_alert_v2}
    command:
      - alembic
      - -c
      - alembic.ini
      - upgrade
      - head
    depends_on:
      product-postgres:
        condition: service_healthy

  internal-jwt-keys:
    image: crypto-manual-alert-v2-backend:local
    pull_policy: never
    restart: "no"
    command:
      - python
      - -m
      - crypto_alert_v2.auth.development_keys
      - /run/internal-jwt-private
      - --public-directory
      - /run/internal-jwt-public
    volumes:
      - type: volume
        source: internal-jwt-private
        target: /run/internal-jwt-private
      - type: volume
        source: internal-jwt-public
        target: /run/internal-jwt-public

  development-bootstrap:
    image: crypto-manual-alert-v2-backend:local
    pull_policy: never
    restart: "no"
    environment:
      APP_ENVIRONMENT: development
      PRODUCT_DATABASE_URL: ${COMPOSE_PRODUCT_DATABASE_URL:-postgresql+asyncpg://crypto_alert:crypto_alert_local@product-postgres:5432/crypto_alert_v2}
      DEVELOPMENT_BOOTSTRAP_ENABLED: "true"
      DEVELOPMENT_BOOTSTRAP_PROFILE: local-proof
      DEVELOPMENT_BOOTSTRAP_SUBJECT: dev-user
      DEVELOPMENT_BOOTSTRAP_TENANT_ID: dev-tenant
      DEVELOPMENT_BOOTSTRAP_WORKSPACE_ID: dev-workspace
      DEVELOPMENT_BOOTSTRAP_ROLES: '["member"]'
      DEVELOPMENT_BOOTSTRAP_PERMISSIONS: '["analysis:read","analysis:write"]'
    command:
      - python
      - -m
      - crypto_alert_v2.auth.development_bootstrap
    depends_on:
      migrate:
        condition: service_completed_successfully

  langgraph-api:
    image: ${LANGGRAPH_API_LOCAL_IMAGE:-crypto-manual-alert-v2-langgraph-api:local}
    pull_policy: never
    restart: unless-stopped
    init: true
    env_file:
      - path: backend/.env
        required: false
    environment:
      APP_ENVIRONMENT: production
      PRODUCT_DATABASE_URL: ${COMPOSE_PRODUCT_DATABASE_URL:-postgresql+asyncpg://crypto_alert:crypto_alert_local@product-postgres:5432/crypto_alert_v2}
      POSTGRES_URI: ${COMPOSE_AGENT_POSTGRES_URI:-postgres://langgraph:langgraph_local@agent-postgres:5432/langgraph?sslmode=disable}
      REDIS_URI: redis://langgraph-redis:6379
      AGENT_SERVER_URL: http://langgraph-api:8000
      AGENT_ASSISTANT_ID: crypto_analysis
      MARKET_DATA_HTTP_PROXY: ${MARKET_DATA_HTTP_PROXY:-}
      INTERNAL_JWT_KID: compose-ephemeral
      INTERNAL_JWT_ISSUER: crypto-manual-alert-v2-compose
      AGENT_SERVER_INTERNAL_JWT_AUDIENCE: crypto-alert-agent-server
      INTERNAL_JWT_MAX_TTL_SECONDS: "60"
      INTERNAL_JWT_PUBLIC_KEY_FILE: /run/internal-jwt-public/public.pem
    ports:
      - 127.0.0.1:${AGENT_SERVER_PORT:-8123}:8000
    volumes:
      - type: volume
        source: internal-jwt-public
        target: /run/internal-jwt-public
        read_only: true
    healthcheck:
      test:
        - CMD
        - python
        - /api/healthcheck.py
      interval: 60s
      start_interval: 1s
      start_period: 10s
    depends_on:
      agent-postgres:
        condition: service_healthy
      langgraph-redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      internal-jwt-keys:
        condition: service_completed_successfully
      development-bootstrap:
        condition: service_completed_successfully

  langgraph-api-readiness:
    image: crypto-manual-alert-v2-backend:local
    pull_policy: never
    restart: "on-failure:12"
    environment:
      APP_ENVIRONMENT: production
      AGENT_SERVER_URL: http://langgraph-api:8000
      AGENT_ASSISTANT_ID: crypto_analysis
      INTERNAL_JWT_KID: compose-ephemeral
      INTERNAL_JWT_ISSUER: crypto-manual-alert-v2-compose
      AGENT_SERVER_INTERNAL_JWT_AUDIENCE: crypto-alert-agent-server
      INTERNAL_JWT_PRIVATE_KEY_FILE: /run/internal-jwt-private/private.pem
      AGENT_HEALTHCHECK_SUBJECT: probe-user
      AGENT_HEALTHCHECK_TENANT_ID: probe-tenant
      AGENT_HEALTHCHECK_WORKSPACE_ID: probe-workspace
      AGENT_HEALTHCHECK_ROLES: '["operator"]'
      AGENT_HEALTHCHECK_PERMISSIONS: '["analysis:read"]'
    command:
      - python
      - -m
      - crypto_alert_v2.auth.agent_healthcheck
    volumes:
      - type: volume
        source: internal-jwt-private
        target: /run/internal-jwt-private
        read_only: true
    depends_on:
      internal-jwt-keys:
        condition: service_completed_successfully
      langgraph-api:
        condition: service_healthy

  command-worker:
    image: crypto-manual-alert-v2-backend:local
    pull_policy: never
    restart: unless-stopped
    init: true
    env_file:
      - path: backend/.env
        required: false
    environment:
      APP_ENVIRONMENT: production
      PRODUCT_DATABASE_URL: ${COMPOSE_PRODUCT_DATABASE_URL:-postgresql+asyncpg://crypto_alert:crypto_alert_local@product-postgres:5432/crypto_alert_v2}
      AGENT_SERVER_URL: http://langgraph-api:8000
      AGENT_ASSISTANT_ID: crypto_analysis
      INTERNAL_JWT_KID: compose-ephemeral
      INTERNAL_JWT_ISSUER: crypto-manual-alert-v2-compose
      AGENT_SERVER_INTERNAL_JWT_AUDIENCE: crypto-alert-agent-server
      INTERNAL_JWT_PRIVATE_KEY_FILE: /run/internal-jwt-private/private.pem
    command:
      - python
      - -m
      - crypto_alert_v2.commands.worker
      - --worker-id
      - compose-worker
    volumes:
      - type: volume
        source: internal-jwt-private
        target: /run/internal-jwt-private
        read_only: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      internal-jwt-keys:
        condition: service_completed_successfully
      development-bootstrap:
        condition: service_completed_successfully
      langgraph-api-readiness:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: crypto-manual-alert-v2-frontend:local
    pull_policy: never
    restart: unless-stopped
    init: true
    environment:
      APP_ENVIRONMENT: development
      PRODUCT_API_BASE_URL: http://langgraph-api:8000/app
      AGENT_SERVER_URL: http://langgraph-api:8000
      AGENT_SERVER_INTERNAL_JWT_AUDIENCE: crypto-alert-agent-server
      INTERNAL_JWT_KID: compose-ephemeral
      INTERNAL_JWT_ISSUER: crypto-manual-alert-v2-compose
      INTERNAL_JWT_PRIVATE_KEY_FILE: /run/internal-jwt-private/private.pem
      DEVELOPMENT_BOOTSTRAP_ENABLED: "true"
      DEVELOPMENT_BOOTSTRAP_PROFILE: local-proof
      DEVELOPMENT_BOOTSTRAP_SUBJECT: dev-user
      DEVELOPMENT_BOOTSTRAP_TENANT_ID: dev-tenant
      DEVELOPMENT_BOOTSTRAP_WORKSPACE_ID: dev-workspace
      DEVELOPMENT_BOOTSTRAP_ROLES: '["member"]'
      DEVELOPMENT_BOOTSTRAP_PERMISSIONS: '["analysis:read","analysis:write"]'
    ports:
      - 127.0.0.1:${FRONTEND_PORT:-3001}:3001
    volumes:
      - type: volume
        source: internal-jwt-private
        target: /run/internal-jwt-private
        read_only: true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "Promise.all([fetch('http://127.0.0.1:3001/api/product/api/v2/health'), fetch('http://127.0.0.1:3001/api/product/api/v2/runs?limit=1'), fetch('http://127.0.0.1:3001/work')]).then((responses) => process.exit(responses.every((response) => response.ok) ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 8s
      retries: 18
      start_period: 15s
    depends_on:
      langgraph-api:
        condition: service_healthy
      langgraph-api-readiness:
        condition: service_completed_successfully
      command-worker:
        condition: service_started

volumes:
  product-postgres-data:
  agent-postgres-data:
  internal-jwt-private:
  internal-jwt-public:
