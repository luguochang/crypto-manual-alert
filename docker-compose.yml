name: crypto-manual-alert

services:
  manual-alert:
    profiles:
      - scheduler
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    image: crypto-manual-alert:0.1.0
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: Asia/Shanghai
      APP_MODE: ${APP_MODE:-SHADOW}
      AUTO_ORDER_ENABLED: "false"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "crypto-alert", "--config", "config/default.yaml", "--config", "config/prod.yaml", "--config", "config/staging.yaml", "show-config"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  api:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    image: crypto-manual-alert:0.1.0
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: Asia/Shanghai
      CONFIG_PATHS: ${CONFIG_PATHS:-config/default.yaml}
      DATA_DIR: /app/data
      APP_MODE: ${APP_MODE:-SHADOW}
      AUTO_ORDER_ENABLED: "false"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    ports:
      - "${API_PORT:-8010}:8010"
    command:
      - python
      - -m
      - uvicorn
      - crypto_manual_alert.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8010"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8010/api/system/health', timeout=5)); raise SystemExit(0 if data.get('ok') else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:22-alpine}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8010}
    image: crypto-manual-alert-frontend:0.1.0
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8010}
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8010}
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const base=process.env.API_INTERNAL_BASE_URL || 'http://api:8010'; fetch(base + '/api/system/health').then(async (r) => { if (!r.ok) process.exit(1); const data = await r.json(); process.exit(data && data.ok ? 0 : 1); }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
