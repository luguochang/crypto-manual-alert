name: crypto-manual-alert-v2

# Local full-stack proof topology. Production should use LangGraph Platform's
# immutable Agent Server image and externally managed PostgreSQL/OIDC secrets.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crypto_alert_v2}
      POSTGRES_USER: ${POSTGRES_USER:-crypto_alert}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crypto_alert_local}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    image: crypto-manual-alert-v2-backend:local
    restart: "no"
    environment:
      PRODUCT_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crypto_alert}:${POSTGRES_PASSWORD:-crypto_alert_local}@postgres:5432/${POSTGRES_DB:-crypto_alert_v2}
    command:
      - alembic
      - -c
      - alembic.ini
      - upgrade
      - head
    depends_on:
      postgres:
        condition: service_healthy

  internal-jwt-keys:
    image: crypto-manual-alert-v2-backend:local
    restart: "no"
    command:
      - python
      - -m
      - crypto_alert_v2.auth.development_keys
      - /run/internal-jwt-private
      - --public-directory
      - /run/internal-jwt-public
    volumes:
      - type: volume
        source: internal-jwt-private
        target: /run/internal-jwt-private
      - type: volume
        source: internal-jwt-public
        target: /run/internal-jwt-public

  development-bootstrap:
    image: crypto-manual-alert-v2-backend:local
    restart: "no"
    environment:
      APP_ENVIRONMENT: development
      PRODUCT_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crypto_alert}:${POSTGRES_PASSWORD:-crypto_alert_local}@postgres:5432/${POSTGRES_DB:-crypto_alert_v2}
      DEVELOPMENT_BOOTSTRAP_ENABLED: "true"
      DEVELOPMENT_BOOTSTRAP_PROFILE: local-proof
      DEVELOPMENT_BOOTSTRAP_SUBJECT: dev-user
      DEVELOPMENT_BOOTSTRAP_TENANT_ID: dev-tenant
      DEVELOPMENT_BOOTSTRAP_WORKSPACE_ID: dev-workspace
      DEVELOPMENT_BOOTSTRAP_ROLES: '["member"]'
      DEVELOPMENT_BOOTSTRAP_PERMISSIONS: '["analysis:read","analysis:write"]'
    command:
      - python
      - -m
      - crypto_alert_v2.auth.development_bootstrap
    depends_on:
      migrate:
        condition: service_completed_successfully

  agent-server:
    image: crypto-manual-alert-v2-backend:local
    restart: unless-stopped
    init: true
    env_file:
      - path: backend/.env
        required: false
    environment:
      APP_ENVIRONMENT: production
      PRODUCT_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crypto_alert}:${POSTGRES_PASSWORD:-crypto_alert_local}@postgres:5432/${POSTGRES_DB:-crypto_alert_v2}
      AGENT_SERVER_URL: http://127.0.0.1:8123
      AGENT_ASSISTANT_ID: crypto_analysis
      MARKET_DATA_HTTP_PROXY: ${MARKET_DATA_HTTP_PROXY:-}
      INTERNAL_JWT_KID: compose-ephemeral
      INTERNAL_JWT_ISSUER: crypto-manual-alert-v2-compose
      AGENT_SERVER_INTERNAL_JWT_AUDIENCE: crypto-alert-agent-server
      INTERNAL_JWT_MAX_TTL_SECONDS: "60"
      INTERNAL_JWT_PUBLIC_KEY_FILE: /run/internal-jwt-public/public.pem
    command:
      - langgraph
      - dev
      - --config
      - langgraph.json
      - --host
      - 0.0.0.0
      - --port
      - "8123"
      - --no-browser
      - --no-reload
    ports:
      - "127.0.0.1:${AGENT_SERVER_PORT:-8123}:8123"
    volumes:
      - type: volume
        source: internal-jwt-public
        target: /run/internal-jwt-public
        read_only: true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; connection=socket.create_connection(('127.0.0.1', 8123), timeout=5); connection.close()"
      interval: 5s
      timeout: 8s
      retries: 24
      start_period: 15s
    depends_on:
      migrate:
        condition: service_completed_successfully
      internal-jwt-keys:
        condition: service_completed_successfully
      development-bootstrap:
        condition: service_completed_successfully

  agent-server-readiness:
    image: crypto-manual-alert-v2-backend:local
    restart: "on-failure:12"
    environment:
      APP_ENVIRONMENT: production
      AGENT_SERVER_URL: http://agent-server:8123
      AGENT_ASSISTANT_ID: crypto_analysis
      INTERNAL_JWT_KID: compose-ephemeral
      INTERNAL_JWT_ISSUER: crypto-manual-alert-v2-compose
      AGENT_SERVER_INTERNAL_JWT_AUDIENCE: crypto-alert-agent-server
      INTERNAL_JWT_PRIVATE_KEY_FILE: /run/internal-jwt-private/private.pem
      AGENT_HEALTHCHECK_SUBJECT: probe-user
      AGENT_HEALTHCHECK_TENANT_ID: probe-tenant
      AGENT_HEALTHCHECK_WORKSPACE_ID: probe-workspace
      AGENT_HEALTHCHECK_ROLES: '["operator"]'
      AGENT_HEALTHCHECK_PERMISSIONS: '["analysis:read"]'
    command:
      - python
      - -m
      - crypto_alert_v2.auth.agent_healthcheck
    volumes:
      - type: volume
        source: internal-jwt-private
        target: /run/internal-jwt-private
        read_only: true
    depends_on:
      internal-jwt-keys:
        condition: service_completed_successfully
      agent-server:
        condition: service_healthy

  command-worker:
    image: crypto-manual-alert-v2-backend:local
    restart: unless-stopped
    init: true
    env_file:
      - path: backend/.env
        required: false
    environment:
      APP_ENVIRONMENT: production
      PRODUCT_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crypto_alert}:${POSTGRES_PASSWORD:-crypto_alert_local}@postgres:5432/${POSTGRES_DB:-crypto_alert_v2}
      AGENT_SERVER_URL: http://agent-server:8123
      AGENT_ASSISTANT_ID: crypto_analysis
      INTERNAL_JWT_KID: compose-ephemeral
      INTERNAL_JWT_ISSUER: crypto-manual-alert-v2-compose
      AGENT_SERVER_INTERNAL_JWT_AUDIENCE: crypto-alert-agent-server
      INTERNAL_JWT_PRIVATE_KEY_FILE: /run/internal-jwt-private/private.pem
    command:
      - python
      - -m
      - crypto_alert_v2.commands.worker
      - --worker-id
      - compose-worker
    volumes:
      - type: volume
        source: internal-jwt-private
        target: /run/internal-jwt-private
        read_only: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      internal-jwt-keys:
        condition: service_completed_successfully
      development-bootstrap:
        condition: service_completed_successfully
      agent-server-readiness:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:22-alpine}
    image: crypto-manual-alert-v2-frontend:local
    restart: unless-stopped
    init: true
    environment:
      APP_ENVIRONMENT: development
      PRODUCT_API_BASE_URL: http://agent-server:8123/app
      AGENT_SERVER_URL: http://agent-server:8123
      AGENT_SERVER_INTERNAL_JWT_AUDIENCE: crypto-alert-agent-server
      INTERNAL_JWT_KID: compose-ephemeral
      INTERNAL_JWT_ISSUER: crypto-manual-alert-v2-compose
      INTERNAL_JWT_PRIVATE_KEY_FILE: /run/internal-jwt-private/private.pem
      DEVELOPMENT_BOOTSTRAP_ENABLED: "true"
      DEVELOPMENT_BOOTSTRAP_PROFILE: local-proof
      DEVELOPMENT_BOOTSTRAP_SUBJECT: dev-user
      DEVELOPMENT_BOOTSTRAP_TENANT_ID: dev-tenant
      DEVELOPMENT_BOOTSTRAP_WORKSPACE_ID: dev-workspace
      DEVELOPMENT_BOOTSTRAP_ROLES: '["member"]'
      DEVELOPMENT_BOOTSTRAP_PERMISSIONS: '["analysis:read","analysis:write"]'
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3001}:3001"
    volumes:
      - type: volume
        source: internal-jwt-private
        target: /run/internal-jwt-private
        read_only: true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "Promise.all([fetch('http://127.0.0.1:3001/api/product/api/v2/health'), fetch('http://127.0.0.1:3001/api/product/api/v2/runs?limit=1'), fetch('http://127.0.0.1:3001/work')]).then((responses) => process.exit(responses.every((response) => response.ok) ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 8s
      retries: 18
      start_period: 15s
    depends_on:
      agent-server:
        condition: service_healthy
      command-worker:
        condition: service_started

volumes:
  postgres-data:
  internal-jwt-private:
  internal-jwt-public:
