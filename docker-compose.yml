# V2 基础设施：PostgreSQL、Redis、Langfuse
# Agent Server（backend）和 Frontend 由 langgraph dev / next dev 本地启动
# 设计文档 V2技术设计缺口补充 第五节

services:
  # PostgreSQL - LangGraph Checkpoint + 产品业务表 + Langfuse
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crypto_alert
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init-db.sql 创建 langfuse 数据库，与 crypto_alert 隔离
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d crypto_alert"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - Agent Server 流式与任务协调
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Langfuse - 生产 LLM Observability（自部署）
  # 设计文档第 14 节：Langfuse 负责生产成本、时延、会话、用户维度分析
  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://agent:agent@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-nextauth-secret}
      SALT: ${LANGFUSE_SALT:-changeme-salt}
      NEXTAUTH_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
