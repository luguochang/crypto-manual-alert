app:
  mode: SHADOW
  data_dir: /app/data

market_data:
  provider: okx_public

trading:
  auto_order_enabled: false
  manual_execution_required: true

decision:
  engine: openai_compatible
  final_input_mode: legacy_prompt
  timeout_seconds: 1200
  candidate_sidecar_mode: disabled

workflow:
  execution_mode: legacy_baseline

notification:
  enabled: true

scheduler:
  enabled: true
  interval_seconds: 1800
  run_on_start: true
  lock_ttl_seconds: 1800
  job_timeout_seconds: 1800

research:
  enabled: true
  planner: llm
  leader_mode: llm
  search_provider: responses_web_search
  max_workers: 4
  request_timeout_seconds: 300
